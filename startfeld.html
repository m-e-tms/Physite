<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<title>Modus-Auswahl</title>
<meta name="author" content="joerg.ludwig">
<meta name="editor" content="html-editor phase 5">
</head>
<body>
<div class="container">
<h1>Modus ausw&auml;hlen</h1>

<p class="mode-description">Zeitmodus:</p>
<form action="aufgabenfeld_zeit.php" method="post">
    <input type="hidden" name="solution" value="">
    <input type="hidden" name="score" value="0">
    <input type="hidden" name="hide" value="1">
    <input type="hidden" name="endTime" value="">
    <button type="submit" class="timemode">Starten</button>
</form>                       <i></i>

<p class="mode-description">Progressivmodus:</p>
<form action="aufgabenfeld_level.php" method="post">
    <input type="hidden" name="solution" value="">
    <input type="hidden" name="score" value="1">
    <input type="hidden" name="hide" value="1">
    <select name="mode">
        <option value="0">Normal</option>
        <option value="25">Schwierig</option>
        <option value="50">Ultraschwierig</option>
    </select>
    <button type="submit" class="progressivemode">Starten</button>
</form>

</div>

</body>
</html>
